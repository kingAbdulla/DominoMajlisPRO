name: MAUI Cloud Sync CI

on:
  push:
    branches:
      - agent/web-preview-foundation
    paths:
      - DominoMajlisPRO/Cloud/**
      - DominoMajlisPRO/Services/PlayerProfileService.cs
      - DominoMajlisPRO/Services/TeamProfileService.cs
      - DominoMajlisPRO/Services/GameService.cs
      - DominoMajlisPRO/MauiProgram.cs
      - DominoMajlisPRO/DominoMajlisPRO.csproj
      - .github/workflows/maui-cloud-sync-ci.yml
  pull_request:
    paths:
      - DominoMajlisPRO/Cloud/**
      - DominoMajlisPRO/Services/PlayerProfileService.cs
      - DominoMajlisPRO/Services/TeamProfileService.cs
      - DominoMajlisPRO/Services/GameService.cs
      - DominoMajlisPRO/MauiProgram.cs
      - DominoMajlisPRO/DominoMajlisPRO.csproj
      - .github/workflows/maui-cloud-sync-ci.yml
  workflow_dispatch:

jobs:
  android-build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install MAUI workload
        run: dotnet workload install maui-android
      - name: Restore Android target
        run: dotnet restore DominoMajlisPRO/DominoMajlisPRO.csproj -p:TargetFramework=net10.0-android
      - name: Build Android target
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          dotnet build DominoMajlisPRO/DominoMajlisPRO.csproj -c Debug -f net10.0-android --no-restore -v:minimal 2>&1 | Tee-Object -FilePath build.log
          $exitCode = $LASTEXITCODE
          $errors = Select-String -Path build.log -Pattern 'error (CS|MSB|XA|NETSDK)[0-9]+' -CaseSensitive:$false
          Add-Content $env:GITHUB_STEP_SUMMARY '## Android build diagnostics'
          if ($errors) {
            Add-Content $env:GITHUB_STEP_SUMMARY '```text'
            $errors | ForEach-Object { Add-Content $env:GITHUB_STEP_SUMMARY $_.Line }
            Add-Content $env:GITHUB_STEP_SUMMARY '```'
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY 'No compiler error lines were matched; inspect the Build Android target log.'
          }
          exit $exitCode
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maui-android-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3
