name: Web Production CI

on:
  push:
    branches:
      - feature/web-production-full
    paths:
      - 'WebProduction/**'
      - '.github/workflows/web-production-ci.yml'
  pull_request:
    paths:
      - 'WebProduction/**'
      - '.github/workflows/web-production-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate JavaScript syntax
        run: |
          node --check WebProduction/store-domain.js
          node --check WebProduction/store-ui.js
          node --check WebProduction/gallery-ui.js
          node --check WebProduction/gallery-nav.js
          node --check WebProduction/app.js
      - name: Validate required production files and routes
        shell: bash
        run: |
          test -s WebProduction/index.html
          test -s WebProduction/styles.css
          test -s WebProduction/store.css
          test -s WebProduction/gallery.css
          test -s WebProduction/store-domain.js
          test -s WebProduction/store-ui.js
          test -s WebProduction/gallery-ui.js
          test -s WebProduction/gallery-nav.js
          test -s WebProduction/app.js
          grep -q 'Domino Majlis PRO' WebProduction/index.html
          grep -q 'store-domain.js' WebProduction/index.html
          grep -q 'store-ui.js' WebProduction/index.html
          grep -q 'gallery-ui.js' WebProduction/index.html
          grep -q 'gallery-nav.js' WebProduction/index.html
          grep -q 'store.css' WebProduction/index.html
          grep -q 'gallery.css' WebProduction/index.html
          grep -q '/api/preview/login' WebProduction/app.js
          grep -q '/api/preview/me/teams' WebProduction/app.js
          grep -q '/api/v1/players' WebProduction/app.js
          grep -q '/api/v1/matches' WebProduction/app.js
          grep -q '/api/v1/rankings' WebProduction/app.js
          grep -q 'function updateStatsAfterMatch' WebProduction/app.js
          grep -q 'function rankingsView' WebProduction/app.js
          grep -q 'function seasonInfo' WebProduction/app.js
          grep -q 'function seasonView' WebProduction/app.js
          grep -q 'function statisticsView' WebProduction/app.js
          grep -q 'function badgesForTeam' WebProduction/app.js
          grep -q 'function badgesView' WebProduction/app.js
          grep -q 'function hallEligible' WebProduction/app.js
          grep -q 'function hallView' WebProduction/app.js
          grep -q 'Hall of Fame' WebProduction/app.js
          grep -q 'badge-grid' WebProduction/styles.css
          grep -q 'season-card' WebProduction/styles.css
          grep -q 'hall-row' WebProduction/styles.css
          grep -q "catalog:'store-items'" WebProduction/store-domain.js
          grep -q "wallets:'wallets'" WebProduction/store-domain.js
          grep -q "inventory:'inventory'" WebProduction/store-domain.js
          grep -q 'async function acquire' WebProduction/store-domain.js
          grep -q 'async function equip' WebProduction/store-domain.js
          grep -q 'window.DominoStoreDomain' WebProduction/store-domain.js
          grep -q 'function productCard' WebProduction/store-ui.js
          grep -q 'function inventoryCard' WebProduction/store-ui.js
          grep -q 'data-store-action' WebProduction/store-ui.js
          grep -q 'DominoStoreUI' WebProduction/store-ui.js
          grep -q 'store-grid' WebProduction/store.css
          grep -q 'store-wallet' WebProduction/store.css
          grep -q '/api/v1/store-items' WebProduction/gallery-ui.js
          grep -q 'function assetUrl' WebProduction/gallery-ui.js
          grep -q 'function categories' WebProduction/gallery-ui.js
          grep -q 'function card' WebProduction/gallery-ui.js
          grep -q 'DominoGalleryUI' WebProduction/gallery-ui.js
          grep -q 'gallery-grid' WebProduction/gallery.css
          grep -q 'gallery-preview' WebProduction/gallery.css
