<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Domino Majlis PRO — Web Preview</title>
  <style>
    :root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--gold2:#f4d97a;--text:#f7f2df;--muted:#aaa38f;--line:#2a261b;--ok:#55d68b}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;background:radial-gradient(circle at top,#211a09 0,#0b0b0e 42%,#070709 100%);color:var(--text);min-height:100vh}
    .app{max-width:560px;margin:auto;padding:calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 30px)}
    .brand{text-align:center;padding:28px 8px 20px}.crest{width:92px;height:92px;margin:auto;border:1px solid #806b2f;border-radius:28px;background:linear-gradient(145deg,#2b230d,#0e0d0a);display:grid;place-items:center;box-shadow:0 0 40px #d4af3722,inset 0 0 24px #000}.crest span{font-size:46px}.brand h1{font-size:25px;margin:16px 0 5px;color:var(--gold2)}.brand p{margin:0;color:var(--muted);font-size:14px}
    .card{background:linear-gradient(180deg,#17171b,#101013);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 50px #0008;margin-bottom:15px}.status{display:flex;justify-content:space-between;gap:12px;align-items:center}.dot{width:10px;height:10px;border-radius:50%;background:#e6ae35;box-shadow:0 0 14px #e6ae35}.dot.online{background:var(--ok);box-shadow:0 0 14px var(--ok)}.status small{color:var(--muted)}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab,.primary,.ghost{appearance:none;border:0;border-radius:15px;padding:13px 10px;font-weight:700;font-size:14px}.tab{background:#1c1b18;color:#c9c1a9;border:1px solid #302a1b}.tab.active,.primary{background:linear-gradient(135deg,#b88b21,#f0d06c);color:#171205}.ghost{background:#17171a;color:#e7debd;border:1px solid #3a321d;width:100%}
    label{display:block;color:#cfc6ad;font-size:13px;margin:13px 2px 7px}input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid #332e20;background:#0c0c0f;color:white;font-size:16px;outline:none}input:focus{border-color:#ad8b31;box-shadow:0 0 0 3px #d4af3714}.primary{width:100%;margin-top:16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:#0d0d10;border:1px solid #272319;border-radius:16px;padding:14px}.metric b{display:block;color:var(--gold2);font-size:20px}.metric span{font-size:12px;color:var(--muted)}
    .notice{font-size:13px;line-height:1.7;color:#b9b19c}.hidden{display:none}.footer{text-align:center;color:#777064;font-size:12px;padding:16px}.team{padding:12px;border:1px solid #2d281c;border-radius:14px;margin-top:8px;background:#0d0d10}.error{color:#ff9a9a}
  </style>
</head>
<body>
<main class="app">
  <section class="brand"><div class="crest"><span>♛</span></div><h1>Domino Majlis PRO</h1><p>نسخة ويب تجريبية معزولة — لا تعدّل بيانات التطبيق الأصلي</p></section>
  <section class="card"><div class="status"><div><b>حالة النسخة</b><br><small id="connectionText">جارٍ فحص السيرفر</small></div><div class="dot" id="connectionDot"></div></div></section>
  <section class="card" id="authCard">
    <div class="tabs"><button class="tab active" data-mode="login">تسجيل الدخول</button><button class="tab" data-mode="register">إنشاء حساب</button><button class="tab" data-mode="guest">ضيف</button></div>
    <div id="formArea"><label for="username">اسم المستخدم</label><input id="username" autocomplete="username" placeholder="أدخل اسم المستخدم" /><label for="password">كلمة المرور</label><input id="password" type="password" autocomplete="current-password" placeholder="أدخل كلمة المرور" /><button class="primary" id="continueBtn">متابعة</button></div>
    <p class="notice" id="guestText" hidden>وضع الضيف متاح لتجربة الواجهة فقط.</p><p class="notice error" id="message"></p>
  </section>
  <section class="card hidden" id="dashboard">
    <h3 style="margin-top:0;color:var(--gold2)">لوحة الاختبار</h3>
    <div class="grid"><div class="metric"><b id="matchCount">0</b><span>المباريات</span></div><div class="metric"><b id="teamCount">0</b><span>الفرق</span></div><div class="metric"><b>0</b><span>النقاط</span></div><div class="metric"><b>100%</b><span>سلامة بيانات MAUI</span></div></div>
    <label for="teamName">إنشاء فريق تجريبي</label><input id="teamName" placeholder="اسم الفريق" /><button class="primary" id="addTeamBtn">إضافة الفريق</button><div id="teams"></div>
    <button class="ghost" id="logoutBtn" style="margin-top:14px">إنهاء الجلسة التجريبية</button>
  </section>
  <div class="footer">Web Preview Foundation v0.5 — Render Single Service</div>
</main>
<script>
  const queryApi=new URLSearchParams(location.search).get('api');
  const API_BASE=(queryApi||location.origin).replace(/\/$/,'');
  const tabs=[...document.querySelectorAll('.tab')],form=document.getElementById('formArea'),guest=document.getElementById('guestText'),auth=document.getElementById('authCard'),dash=document.getElementById('dashboard'),message=document.getElementById('message');let mode='login';
  const readLocalTeams=()=>JSON.parse(localStorage.getItem('dmp_preview_teams')||'[]');
  const currentUser=()=>JSON.parse(localStorage.getItem('dmp_preview_user')||'null');
  const authHeaders=()=>{const token=localStorage.getItem('dmp_preview_token');return token?{'Authorization':`Bearer ${token}`}:{}};
  function renderTeams(list){document.getElementById('teamCount').textContent=list.length;document.getElementById('teams').innerHTML=list.map(x=>`<div class="team"><b>${escapeHtml(x.name)}</b><br><small>${x.teamId||x.id}</small></div>`).join('');}
  function escapeHtml(value){return String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  async function loadTeams(){try{const r=await fetch(`${API_BASE}/api/preview/me/teams`,{headers:authHeaders()});if(r.status===401){clearSession();return;}if(r.ok){renderTeams(await r.json());setOnline(true);return;}}catch{setOnline(false);}renderTeams(readLocalTeams());}
  tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.mode;const isGuest=mode==='guest';form.hidden=isGuest;guest.hidden=!isGuest;message.textContent='';if(isGuest)setTimeout(()=>openPreview({displayName:'ضيف'},true),150)}));
  document.getElementById('continueBtn').addEventListener('click',async()=>{const username=document.getElementById('username').value.trim(),password=document.getElementById('password').value;if(!username||!password){message.textContent='يرجى إدخال اسم المستخدم وكلمة المرور.';return;}message.textContent='';try{const response=await fetch(`${API_BASE}/api/preview/${mode==='register'?'register':'login'}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});if(!response.ok){let payload={};try{payload=await response.json();}catch{}throw new Error(payload.message||'تعذر تسجيل الدخول');}const session=await response.json();localStorage.setItem('dmp_preview_user',JSON.stringify(session.user));localStorage.setItem('dmp_preview_token',session.accessToken);setOnline(true);openPreview(session.user,false);}catch(error){message.textContent=error.message;setOnline(false);}});
  function openPreview(user,isGuest){auth.classList.add('hidden');dash.classList.remove('hidden');localStorage.setItem('dmp_web_preview_session','active');localStorage.setItem('dmp_preview_guest',isGuest?'true':'false');if(user)localStorage.setItem('dmp_preview_user',JSON.stringify(user));isGuest?renderTeams(readLocalTeams()):loadTeams();}
  document.getElementById('addTeamBtn').addEventListener('click',async()=>{const input=document.getElementById('teamName'),name=input.value.trim();if(!name)return;if(localStorage.getItem('dmp_preview_guest')!=='true'){try{const r=await fetch(`${API_BASE}/api/preview/me/teams`,{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({name})});if(r.status===401){clearSession();return;}if(r.ok){input.value='';await loadTeams();return;}}catch{setOnline(false);}}const list=readLocalTeams();list.push({id:`TEAM-${crypto.randomUUID().replaceAll('-','').toUpperCase()}`,name});localStorage.setItem('dmp_preview_teams',JSON.stringify(list));input.value='';renderTeams(list);});
  document.getElementById('logoutBtn').addEventListener('click',async()=>{try{await fetch(`${API_BASE}/api/preview/logout`,{method:'POST',headers:authHeaders()});}catch{}clearSession();});
  function clearSession(){['dmp_web_preview_session','dmp_preview_token','dmp_preview_user','dmp_preview_guest'].forEach(x=>localStorage.removeItem(x));dash.classList.add('hidden');auth.classList.remove('hidden');}
  function setOnline(value){document.getElementById('connectionDot').classList.toggle('online',value);document.getElementById('connectionText').textContent=value?'متصل بالسيرفر التجريبي':'تعذر الاتصال بالسيرفر';}
  if(localStorage.getItem('dmp_web_preview_session')==='active')openPreview(currentUser(),localStorage.getItem('dmp_preview_guest')==='true');
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  fetch(`${API_BASE}/api/health`).then(r=>setOnline(r.ok)).catch(()=>setOnline(false));
</script>
</body>
</html>
