<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <title>Domino Majlis PRO — Web Preview</title>
  <style>
    :root{--bg:#09090b;--panel:#141418;--gold:#d4af37;--gold2:#f4d97a;--text:#f7f2df;--muted:#aaa38f;--line:#2a261b}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;background:radial-gradient(circle at top,#211a09 0,#0b0b0e 42%,#070709 100%);color:var(--text);min-height:100vh}
    .app{max-width:560px;margin:auto;padding:calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 30px)}
    .brand{text-align:center;padding:28px 8px 20px}.crest{width:92px;height:92px;margin:auto;border:1px solid #806b2f;border-radius:28px;background:linear-gradient(145deg,#2b230d,#0e0d0a);display:grid;place-items:center;box-shadow:0 0 40px #d4af3722,inset 0 0 24px #000}.crest span{font-size:46px}.brand h1{font-size:25px;margin:16px 0 5px;color:var(--gold2)}.brand p{margin:0;color:var(--muted);font-size:14px}
    .card{background:linear-gradient(180deg,#17171b,#101013);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 50px #0008;margin-bottom:15px}.status{display:flex;justify-content:space-between;gap:12px;align-items:center}.dot{width:10px;height:10px;border-radius:50%;background:#e6ae35;box-shadow:0 0 14px #e6ae35}.status small{color:var(--muted)}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab,.primary,.ghost{appearance:none;border:0;border-radius:15px;padding:13px 10px;font-weight:700;font-size:14px}.tab{background:#1c1b18;color:#c9c1a9;border:1px solid #302a1b}.tab.active,.primary{background:linear-gradient(135deg,#b88b21,#f0d06c);color:#171205}.ghost{background:#17171a;color:#e7debd;border:1px solid #3a321d;width:100%}
    label{display:block;color:#cfc6ad;font-size:13px;margin:13px 2px 7px}input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid #332e20;background:#0c0c0f;color:white;font-size:16px;outline:none}input:focus{border-color:#ad8b31;box-shadow:0 0 0 3px #d4af3714}.primary{width:100%;margin-top:16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{background:#0d0d10;border:1px solid #272319;border-radius:16px;padding:14px}.metric b{display:block;color:var(--gold2);font-size:20px}.metric span{font-size:12px;color:var(--muted)}
    .notice{font-size:13px;line-height:1.7;color:#b9b19c}.hidden{display:none}.footer{text-align:center;color:#777064;font-size:12px;padding:16px}
  </style>
</head>
<body>
<main class="app">
  <section class="brand">
    <div class="crest"><span>♛</span></div>
    <h1>Domino Majlis PRO</h1>
    <p>نسخة ويب تجريبية معزولة — لا تعدّل بيانات التطبيق الأصلي</p>
  </section>

  <section class="card">
    <div class="status"><div><b>حالة النسخة</b><br><small>واجهة اختبار أولية</small></div><div class="dot"></div></div>
  </section>

  <section class="card" id="authCard">
    <div class="tabs">
      <button class="tab active" data-mode="login">تسجيل الدخول</button>
      <button class="tab" data-mode="register">إنشاء حساب</button>
      <button class="tab" data-mode="guest">ضيف</button>
    </div>
    <div id="formArea">
      <label for="username">اسم المستخدم</label>
      <input id="username" autocomplete="username" placeholder="أدخل اسم المستخدم" />
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="أدخل كلمة المرور" />
      <button class="primary" id="continueBtn">متابعة</button>
    </div>
    <p class="notice" id="guestText" hidden>وضع الضيف متاح لتجربة الواجهة فقط، ولن ينشئ حسابًا أو يرسل بيانات إلى التطبيق الأصلي.</p>
  </section>

  <section class="card hidden" id="dashboard">
    <h3 style="margin-top:0;color:var(--gold2)">لوحة الاختبار</h3>
    <div class="grid">
      <div class="metric"><b>0</b><span>المباريات</span></div>
      <div class="metric"><b>0</b><span>الفرق</span></div>
      <div class="metric"><b>0</b><span>النقاط</span></div>
      <div class="metric"><b>100%</b><span>سلامة البيانات</span></div>
    </div>
    <button class="ghost" id="logoutBtn" style="margin-top:14px">إنهاء الجلسة التجريبية</button>
  </section>

  <div class="footer">Web Preview Foundation v0.1</div>
</main>
<script>
  const tabs=[...document.querySelectorAll('.tab')];
  const form=document.getElementById('formArea');
  const guest=document.getElementById('guestText');
  const auth=document.getElementById('authCard');
  const dash=document.getElementById('dashboard');
  let mode='login';
  tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.mode;const isGuest=mode==='guest';form.hidden=isGuest;guest.hidden=!isGuest;if(isGuest)setTimeout(openPreview,250)}));
  document.getElementById('continueBtn').addEventListener('click',()=>{const u=document.getElementById('username').value.trim();const p=document.getElementById('password').value;if(!u||!p){alert('يرجى إدخال اسم المستخدم وكلمة المرور للاختبار.');return;}openPreview();});
  function openPreview(){auth.classList.add('hidden');dash.classList.remove('hidden');localStorage.setItem('dmp_web_preview_session','active');}
  document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('dmp_web_preview_session');dash.classList.add('hidden');auth.classList.remove('hidden');});
  if(localStorage.getItem('dmp_web_preview_session')==='active')openPreview();
</script>
</body>
</html>
