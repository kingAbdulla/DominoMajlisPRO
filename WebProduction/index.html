<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Domino Majlis PRO</title>
  <script>
    (() => {
      const productionHost = 'dominomajlispro2.pages.dev';
      const currentHost = window.location.hostname;
      const isCloudflareBranchPreview = currentHost.endsWith(`.${productionHost}`);
      if (isCloudflareBranchPreview) {
        const target = `https://${productionHost}${window.location.pathname}${window.location.search}${window.location.hash}`;
        window.location.replace(target);
      }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./store.css">
  <link rel="stylesheet" href="./gallery.css">
  <link rel="stylesheet" href="./identity.css">
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite">
    <section id="boot" class="boot-screen">
      <div class="brand-mark">♛</div>
      <h1>Domino Majlis PRO</h1>
      <p>جارٍ تشغيل التطبيق...</p>
    </section>
  </div>
  <script src="./store-domain.js"></script>
  <script type="module" src="./app.js"></script>
  <script src="./store-ui.js"></script>
  <script src="./gallery-ui.js"></script>
  <script src="./gallery-nav.js"></script>
  <script src="./identity-runtime.js"></script>
</body>
</html>
